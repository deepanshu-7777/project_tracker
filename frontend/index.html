<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectTracker — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-box" id="login-box">
        <h2>Welcome back</h2>
        <p>Login to your ProjectTracker account</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Login</button>
        <div class="switch">Don't have an account? <a href="#" onclick="toggle()">Sign up</a></div>
    </div>

    <div class="auth-box" id="signup-box" style="display:none">
        <h2>Create account</h2>
        <p>Join ProjectTracker today</p>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="signup-role">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="doSignup()">Create Account</button>
        <div class="switch">Already have an account? <a href="#" onclick="toggle()">Login</a></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard.html';
    }

    function toggle() {
        const lb = document.getElementById('login-box');
        const sb = document.getElementById('signup-box');
        lb.style.display = lb.style.display === 'none' ? 'block' : 'none';
        sb.style.display = sb.style.display === 'none' ? 'block' : 'none';
    }

    async function doLogin() {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !password) return showToast('Please fill all fields', 'error');

        try {
            const data = await apiFetch('/auth/login', 'POST', { email, password });
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            showToast('Login successful!');
            setTimeout(() => window.location.href = '/dashboard.html', 800);
        } catch (e) {
            showToast(e.message, 'error');
        }
    }

    async function doSignup() {
        const name     = document.getElementById('signup-name').value.trim();
        const email    = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const role     = document.getElementById('signup-role').value;

        if (!name || !email || !password) return showToast('Please fill all fields', 'error');

        try {
            await apiFetch('/auth/signup', 'POST', { name, email, password, role });
            showToast('Account created! Please login.');
            toggle();
        } catch (e) {
            showToast(e.message, 'error');
        }
    }
</script>
</body>
</html>
