<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — ProjectTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ProjectTracker</div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="tasks.html">Tasks</a>
    </div>
    <div class="user-info" id="user-info"></div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Projects</h1>
        <button class="btn btn-primary admin-only" onclick="openModal('project-modal')">+ New Project</button>
    </div>
    <div id="projects-list"></div>
</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="project-modal">
    <div class="modal">
        <h3>Create New Project</h3>
        <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="proj-name" placeholder="e.g. Website Redesign">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="proj-desc" rows="3" placeholder="Project description..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal('project-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="createProject()">Create</button>
        </div>
    </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="member-modal">
    <div class="modal">
        <h3>Add Member</h3>
        <input type="hidden" id="member-project-id">
        <div class="form-group">
            <label>User ID</label>
            <input type="number" id="member-user-id" placeholder="Enter user ID">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="member-role">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal('member-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="addMember()">Add</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/app.js"></script>
<script>
requireAuth();
setupNavbar();
const user = getUser();

async function loadProjects() {
    try {
        const projects = await apiFetch('/projects/');
        const el = document.getElementById('projects-list');

        if (projects.length === 0) {
            el.innerHTML = '<div class="empty"><h3>No projects yet</h3><p>Create your first project to get started</p></div>';
            return;
        }

        el.innerHTML = projects.map(p => `
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>${p.name}</h3>
                        <p>${p.description || 'No description'}</p>
                        <p style="margin-top:6px;font-size:12px;color:#aaa">Owner: ${p.owner_name}</p>
                    </div>
                    <div style="display:flex;gap:8px" class="admin-only">
                        <button class="btn btn-sm btn-warning" onclick="openAddMember(${p.id})">+ Member</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProject(${p.id})">Delete</button>
                    </div>
                </div>
                <div id="members-${p.id}">
                    <button class="btn btn-sm" onclick="loadMembers(${p.id})">View Members</button>
                </div>
            </div>`).join('');

        if (user.role !== 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    } catch(e) { showToast(e.message, 'error'); }
}

async function loadMembers(projectId) {
    try {
        const members = await apiFetch(`/projects/${projectId}/members`);
        document.getElementById(`members-${projectId}`).innerHTML = `
            <div style="margin-top:12px">
                <strong style="font-size:13px">Members:</strong>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
                ${members.map(m => `
                    <div style="background:#f8f9fa;padding:6px 12px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:8px">
                        ${m.name} <span class="badge badge-${m.role}">${m.role}</span>
                        ${user.role === 'admin' ? `<button onclick="removeMember(${projectId},${m.id})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:16px">&times;</button>` : ''}
                    </div>`).join('')}
                </div>
            </div>`;
    } catch(e) { showToast(e.message, 'error'); }
}

async function createProject() {
    const name = document.getElementById('proj-name').value.trim();
    const description = document.getElementById('proj-desc').value.trim();
    if (!name) return showToast('Project name is required', 'error');
    try {
        await apiFetch('/projects/', 'POST', { name, description });
        showToast('Project created!');
        closeModal('project-modal');
        document.getElementById('proj-name').value = '';
        document.getElementById('proj-desc').value = '';
        loadProjects();
    } catch(e) { showToast(e.message, 'error'); }
}

async function deleteProject(id) {
    if (!confirm('Delete this project?')) return;
    try {
        await apiFetch(`/projects/${id}`, 'DELETE');
        showToast('Project deleted');
        loadProjects();
    } catch(e) { showToast(e.message, 'error'); }
}

function openAddMember(projectId) {
    document.getElementById('member-project-id').value = projectId;
    openModal('member-modal');
}

async function addMember() {
    const projectId = document.getElementById('member-project-id').value;
    const userId    = document.getElementById('member-user-id').value;
    const role      = document.getElementById('member-role').value;
    if (!userId) return showToast('Enter a user ID', 'error');
    try {
        await apiFetch(`/projects/${projectId}/members`, 'POST', { user_id: parseInt(userId), role });
        showToast('Member added!');
        closeModal('member-modal');
        loadProjects();
    } catch(e) { showToast(e.message, 'error'); }
}

async function removeMember(projectId, userId) {
    if (!confirm('Remove this member?')) return;
    try {
        await apiFetch(`/projects/${projectId}/members/${userId}`, 'DELETE');
        showToast('Member removed');
        loadMembers(projectId);
    } catch(e) { showToast(e.message, 'error'); }
}

loadProjects();
</script>
</body>
</html>
