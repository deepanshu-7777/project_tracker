<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — ProjectTracker</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">⬡ ProjectTracker</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="tasks.html">Tasks</a>
  </div>
  <div class="nav-right" id="user-info"></div>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Projects</h1>
      <p>Manage your projects and team members.</p>
    </div>
    <button class="btn btn-primary admin-only" onclick="openModal('project-modal')">
      + New Project
    </button>
  </div>

  <div class="projects-grid" id="projects-list">
    <div style="color:var(--text3);font-size:14px;padding:40px 0;text-align:center;grid-column:1/-1">Loading projects...</div>
  </div>
</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Project</h3>
      <button class="modal-close" onclick="closeModal('project-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="proj-name" placeholder="e.g. Website Redesign">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="proj-desc" rows="3" placeholder="What is this project about?"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('project-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create Project</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="member-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Team Member</h3>
      <button class="modal-close" onclick="closeModal('member-modal')">✕</button>
    </div>
    <input type="hidden" id="member-project-id">
    <div class="form-group">
      <label>User ID</label>
      <input type="number" id="member-user-id" placeholder="Enter the user's ID">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="member-role">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('member-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addMember()">Add Member</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/app.js"></script>
<script>
requireAuth();
setupNavbar();
const user = getUser();

async function loadProjects() {
  try {
    const projects = await apiFetch('/projects/');
    const el = document.getElementById('projects-list');

    if (projects.length === 0) {
      el.innerHTML = `
        <div class="empty" style="grid-column:1/-1;padding:80px 20px">
          <div class="empty-icon">🗂</div>
          <h3>No projects yet</h3>
          <p>Create your first project to get started</p>
          ${user.role === 'admin' ? '<br><button class="btn btn-primary" onclick="openModal(\'project-modal\')">+ Create Project</button>' : ''}
        </div>`;
      return;
    }

    el.innerHTML = projects.map(p => `
      <div class="project-card" id="pcard-${p.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="width:40px;height:40px;background:var(--accent-g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
            🗂
          </div>
          <div class="admin-only" style="display:flex;gap:6px">
            <button class="btn btn-sm btn-warning" onclick="openAddMember(${p.id})">+ Member</button>
            <button class="btn btn-sm btn-danger" onclick="deleteProject(${p.id})">Delete</button>
          </div>
        </div>

        <h3>${p.name}</h3>
        <p>${p.description || '<span style="color:var(--text3);font-style:italic">No description provided</span>'}</p>

        <div class="project-meta">
          <span>👤 ${p.owner_name}</span>
          <span>•</span>
          <a href="tasks.html?project_id=${p.id}" style="color:var(--accent2);text-decoration:none;font-weight:600">View Tasks →</a>
        </div>

        <div class="section-title" style="margin-top:16px">Team Members</div>
        <div id="members-${p.id}">
          <button class="btn btn-ghost btn-sm" onclick="loadMembers(${p.id})">Load members</button>
        </div>
      </div>`).join('');

    if (user.role !== 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    }
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadMembers(projectId) {
  try {
    const members = await apiFetch(`/projects/${projectId}/members`);
    const el = document.getElementById(`members-${projectId}`);

    if (members.length === 0) {
      el.innerHTML = '<p style="color:var(--text3);font-size:13px">No members yet</p>';
      return;
    }

    el.innerHTML = `<div class="member-pills">
      ${members.map(m => `
        <div class="member-pill">
          <span style="font-weight:600;color:var(--text)">${m.name}</span>
          <span class="badge badge-${m.role}">${m.role}</span>
          ${user.role === 'admin' ? `<button onclick="removeMember(${projectId},${m.id})" title="Remove">✕</button>` : ''}
        </div>`).join('')}
    </div>`;
  } catch(e) { showToast(e.message, 'error'); }
}

async function createProject() {
  const name = document.getElementById('proj-name').value.trim();
  const description = document.getElementById('proj-desc').value.trim();
  if (!name) return showToast('Project name is required', 'error');
  try {
    await apiFetch('/projects/', 'POST', { name, description });
    showToast('Project created!', 'success');
    closeModal('project-modal');
    document.getElementById('proj-name').value = '';
    document.getElementById('proj-desc').value = '';
    loadProjects();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project and all its tasks?')) return;
  try {
    await apiFetch(`/projects/${id}`, 'DELETE');
    showToast('Project deleted', 'info');
    loadProjects();
  } catch(e) { showToast(e.message, 'error'); }
}

function openAddMember(projectId) {
  document.getElementById('member-project-id').value = projectId;
  document.getElementById('member-user-id').value = '';
  openModal('member-modal');
}

async function addMember() {
  const projectId = document.getElementById('member-project-id').value;
  const userId    = document.getElementById('member-user-id').value;
  const role      = document.getElementById('member-role').value;
  if (!userId) return showToast('Enter a user ID', 'error');
  try {
    await apiFetch(`/projects/${projectId}/members`, 'POST', { user_id: parseInt(userId), role });
    showToast('Member added!', 'success');
    closeModal('member-modal');
    loadMembers(projectId);
  } catch(e) { showToast(e.message, 'error'); }
}

async function removeMember(projectId, userId) {
  if (!confirm('Remove this member?')) return;
  try {
    await apiFetch(`/projects/${projectId}/members/${userId}`, 'DELETE');
    showToast('Member removed', 'info');
    loadMembers(projectId);
  } catch(e) { showToast(e.message, 'error'); }
}

loadProjects();
</script>
</body>
</html>
